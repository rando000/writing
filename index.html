<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --text: #1a1a18;
    --muted: #6b6b65;
    --faint: #9b9b94;
    --border: #e8e6e0;
    --bg: #faf9f7;
    --accent: #c8603a;
  }
  html { font-size: 18px; }
  body { background: var(--bg); color: var(--text); font-family: 'Lora', Georgia, serif; line-height: 1.75; padding: 0 1.5rem; }
  .site { max-width: 640px; margin: 0 auto; padding: 4rem 0 6rem; }

  header { margin-bottom: 3.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }
  .site-name { font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 1rem; letter-spacing: -0.01em; color: var(--text); text-decoration: none; cursor: pointer; background: none; border: none; padding: 0; }

  .section-label { font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); margin-bottom: 0.75rem; }

  .essays { list-style: none; }
  .essay-item { padding: 1.25rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; gap: 1.5rem; }
  .essay-item:first-child { padding-top: 0; }
  .essay-link { color: var(--text); text-decoration: none; font-size: 1rem; font-weight: 400; line-height: 1.4; transition: color 0.15s; flex: 1; cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; text-align: left; }
  .essay-link:hover { color: var(--accent); }
  .essay-date { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--faint); white-space: nowrap; flex-shrink: 0; }

  .essay-header { margin-bottom: 2.5rem; }
  .essay-title { font-size: 1.75rem; font-weight: 500; line-height: 1.25; letter-spacing: -0.02em; margin-bottom: 0.6rem; }
  .essay-meta { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--faint); }
  .essay-body { font-size: 1rem; line-height: 1.85; }
  .essay-body p { margin-bottom: 1.4rem; }

  .back-link { display: inline-flex; align-items: center; gap: 0.35rem; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--muted); text-decoration: none; margin-bottom: 3rem; cursor: pointer; background: none; border: none; padding: 0; transition: color 0.15s; }
  .back-link:hover { color: var(--text); }

  .empty-state { font-size: 0.95rem; color: var(--faint); padding: 1.25rem 0; }

  .loading { font-size: 0.9rem; color: var(--faint); padding: 1.25rem 0; }

  footer { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--faint); }

  @media (max-width: 500px) {
    html { font-size: 17px; }
    .essay-item { flex-direction: column; gap: 0.2rem; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="site">

  <header>
    <button class="site-name" onclick="showHome()">Writing</button>
  </header>

  <div id="content">
    <p class="loading">Loading...</p>
  </div>

  <footer>&copy; 2026</footer>
</div>

<script>
  let essays = [];

  async function loadEssays() {
    try {
      const res = await fetch('/essays.json?t=' + Date.now());
      const data = await res.json();
      essays = data.essays || [];
      showHome();
    } catch (e) {
      document.getElementById('content').innerHTML = '<p class="empty-state">Could not load essays.</p>';
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderParagraphs(body) {
    return body.split(/\n\n+/).map(p => `<p>${escapeHtml(p.trim()).replace(/\n/g, '<br>')}</p>`).join('');
  }

  function showHome() {
    const content = document.getElementById('content');
    if (essays.length === 0) {
      content.innerHTML = '<p class="section-label">Essays</p><p class="empty-state">Nothing here yet.</p>';
    } else {
      content.innerHTML = `
        <p class="section-label">Essays</p>
        <ul class="essays">
          ${essays.map(e => `
            <li class="essay-item">
              <button class="essay-link" onclick="showEssay('${escapeHtml(e.id)}')">${escapeHtml(e.title)}</button>
              <span class="essay-date">${escapeHtml(e.date)}</span>
            </li>
          `).join('')}
        </ul>`;
    }
    window.scrollTo(0, 0);
  }

  function showEssay(id) {
    const essay = essays.find(e => e.id === id);
    if (!essay) return showHome();
    document.getElementById('content').innerHTML = `
      <button class="back-link" onclick="showHome()">← Essays</button>
      <div class="essay-header">
        <h1 class="essay-title">${escapeHtml(essay.title)}</h1>
        <div class="essay-meta">${escapeHtml(essay.date)}</div>
      </div>
      <div class="essay-body">${renderParagraphs(essay.body)}</div>`;
    window.scrollTo(0, 0);
  }

  loadEssays();
</script>
</body>
</html>
