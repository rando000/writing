<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --text: #1a1a18;
    --muted: #6b6b65;
    --faint: #9b9b94;
    --border: #e8e6e0;
    --bg: #faf9f7;
    --accent: #c8603a;
  }
  html { font-size: 18px; }
  body { background: var(--bg); color: var(--text); font-family: 'Lora', Georgia, serif; line-height: 1.75; padding: 0 1.5rem; }
  .site { max-width: 640px; margin: 0 auto; padding: 4rem 0 6rem; }
  header { margin-bottom: 3.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }
  .site-name { font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 1rem; letter-spacing: -0.01em; color: var(--text); text-decoration: none; }
  .essays { list-style: none; }
  .essay-item { padding: 1.25rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; gap: 1.5rem; }
  .essay-item:first-child { padding-top: 0; }
  .essay-link { color: var(--text); text-decoration: none; font-size: 1rem; font-weight: 400; line-height: 1.4; transition: color 0.15s; flex: 1; }
  .essay-link:hover { color: var(--accent); }
  .essay-date { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--faint); white-space: nowrap; flex-shrink: 0; }
  .section-label { font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); margin-bottom: 0.75rem; }
  .essay-header { margin-bottom: 2.5rem; }
  .essay-title { font-size: 1.75rem; font-weight: 500; line-height: 1.25; letter-spacing: -0.02em; margin-bottom: 0.6rem; }
  .essay-meta { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--faint); }
  .essay-body { font-size: 1rem; line-height: 1.85; }
  .essay-body p { margin-bottom: 1.4rem; }
  .essay-body h2 { font-size: 1.15rem; font-weight: 500; margin: 2.5rem 0 0.75rem; letter-spacing: -0.01em; }
  .essay-body a { color: var(--text); text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 3px; transition: text-decoration-color 0.15s; }
  .essay-body a:hover { text-decoration-color: var(--accent); }
  .back-link { display: inline-flex; align-items: center; gap: 0.35rem; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--muted); text-decoration: none; margin-bottom: 3rem; transition: color 0.15s; }
  .back-link:hover { color: var(--text); }
  .page { display: none; }
  .page.active { display: block; }
  footer { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--faint); }
  @media (max-width: 500px) { html { font-size: 17px; } .essay-item { flex-direction: column; gap: 0.2rem; } }
</style>
</head>
<body>
<div class="site">

  <header>
    <a class="site-name" href="#" onclick="showPage('home'); return false;">Writing</a>
  </header>

  <!-- HOME PAGE -->
  <div id="home" class="page active">
    <p class="section-label">Essays</p>
    <ul class="essays">

    </ul>
  </div>

  <!-- ABOUT PAGE -->

  <footer>&copy; 2026</footer>

</div>

<script>
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }
  function showEssay(id) { showPage(id); }
</script>
</body>
</html>
